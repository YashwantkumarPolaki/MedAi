services:
  - type: web
    name: medai-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false          # set this manually in Render dashboard
      - key: PORT
        generateValue: false
    healthCheckPath: /api/health
    autoDeploy: true
