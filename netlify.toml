[build]
  publish = "frontend"

# ── Proxy /api/* → Render backend ─────────────────────────────────────────────
# Replace RENDER_URL below with your actual Render service URL after deploying.
# Example: https://medai-backend.onrender.com
[[redirects]]
  from   = "/api/*"
  to     = "https://RENDER_URL.onrender.com/api/:splat"
  status = 200
  force  = true

# ── SPA fallback (serves index.html for any unmatched route) ──────────────────
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
